<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>Candidate Dashboard</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {

            background: #f4f7fb;
            padding: 20px;

        }

        .header {

            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;

        }

        .title {

            font-size: 28px;
            font-weight: bold;
            color: #1e293b;

        }

        .toolbar {

            display: flex;
            gap: 10px;
            flex-wrap: wrap;

        }

        .toolbar input,
        .toolbar select {

            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background: white;

        }

        .toolbar button {

            padding: 10px 20px;
            border: none;
            background: #2563eb;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;

        }

        .stats {

            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 20px;

        }

        .card {

            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);

        }

        .card h3 {

            color: #64748b;
            font-size: 14px;
            margin-bottom: 10px;

        }

        .card h1 {

            font-size: 32px;
            color: #0f172a;

        }

        .table-container {

            background: white;
            border-radius: 12px;
            overflow-x: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);

        }

        table {

            width: 100%;
            border-collapse: collapse;

        }

        th {

            background: #f8fafc;
            color: #475569;
            font-size: 13px;
            text-align: left;
            padding: 15px;
            border-bottom: 1px solid #e2e8f0;

        }

        td {

            padding: 14px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;

        }

        tr:hover {

            background: #f8fafc;

        }

        .status {

            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;

        }

        .new {

            background: #dbeafe;
            color: #1d4ed8;

        }

        .selected {

            background: #dcfce7;
            color: #15803d;

        }

        .rejected {

            background: #fee2e2;
            color: #dc2626;

        }

        .progress {

            background: #fef3c7;
            color: #d97706;

        }

        .view-btn {

            background: #2563eb;
            color: white;
            border: none;
            padding: 7px 12px;
            border-radius: 6px;
            cursor: pointer;

        }

        .pagination {

            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 20px;

        }

        .pagination button {

            padding: 8px 14px;
            border: none;
            background: #2563eb;
            color: white;
            border-radius: 6px;
            cursor: pointer;

        }

        .modal {

            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: none;
            justify-content: center;
            align-items: center;

        }

        .modal-content {

            width: 90%;
            max-width: 700px;
            background: white;
            border-radius: 12px;
            padding: 30px;

        }

        .details-grid {

            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;

        }

        .detail {

            background: #f8fafc;
            padding: 15px;
            border-radius: 10px;

        }

        .loading {

            text-align: center;
            padding: 30px;
            font-size: 18px;
            font-weight: bold;

        }

    </style>

</head>

<body>

    <div class="header">

        <div class="title">
            Candidate Dashboard
        </div>

        <div class="toolbar">

            <select id="recruiterFilter">
                <option value="all">All Recruiters</option>
            </select>

            <select id="statusFilter">
                <option value="all">All Status</option>
            </select>

            <input
                type="date"
                id="startDate"
            />

            <input
                type="date"
                id="endDate"
            />

            <input
                type="text"
                id="searchInput"
                placeholder="Search Candidate"
            />

            <button onclick="loadCandidates()">
                Refresh
            </button>

        </div>

    </div>

    <div class="stats">

        <div class="card">
            <h3>Total Candidates</h3>
            <h1 id="totalCount">0</h1>
        </div>

        <div class="card">
            <h3>Selected</h3>
            <h1 id="selectedCount">0</h1>
        </div>

        <div class="card">
            <h3>Interview In Progress</h3>
            <h1 id="progressCount">0</h1>
        </div>

        <div class="card">
            <h3>Rejected</h3>
            <h1 id="rejectedCount">0</h1>
        </div>

    </div>

    <div class="table-container">

        <table>

            <thead>

                <tr>

                    <th>Candidate</th>
                    <th>Email</th>
                    <th>Recruiter</th>
                    <th>Status</th>
                    <th>Date</th>
                    <th>Action</th>

                </tr>

            </thead>

            <tbody id="candidateTable">

                <tr>
                    <td
                        colspan="6"
                        class="loading"
                    >
                        Loading Candidates...
                    </td>
                </tr>

            </tbody>

        </table>

    </div>

    <div class="pagination">

        <button onclick="prevPage()">
            Prev
        </button>

        <span id="pageInfo">
            Page 1
        </span>

        <button onclick="nextPage()">
            Next
        </button>

    </div>

    <div
        class="modal"
        id="candidateModal"
    >

        <div class="modal-content">

            <h2>
                Candidate Details
            </h2>

            <div
                class="details-grid"
                id="candidateDetails"
            >
            </div>

            <button
                style="
                    margin-top:20px;
                    width:100%;
                    padding:12px;
                    background:#ef4444;
                    color:white;
                    border:none;
                    border-radius:8px;
                "
                onclick="closeModal()"
            >
                Close
            </button>

        </div>

    </div>

<script>

const API_URL = "/api";

let allCandidates = [];

let filteredCandidates = [];

let currentPage = 1;

const rowsPerPage = 100;

/* ====================================
   LOAD DATA
==================================== */

async function loadCandidates() {

    try {

        document.getElementById(
            "candidateTable"
        ).innerHTML =
        `
        <tr>
            <td colspan="6" class="loading">
                Loading 13K+ Candidates...
            </td>
        </tr>
        `;

        const response =
        await fetch(
            `${API_URL}/module/Candidates`
        );

        const result =
        await response.json();

        allCandidates =
        result.data || [];

        console.log(
            "Total Candidates:",
            allCandidates.length
        );

        buildFilters();

        applyFilters();

    } catch (error) {

        console.log(error);

        alert(
            "Failed To Load Candidates"
        );

    }

}

/* ====================================
   BUILD FILTERS
==================================== */

function buildFilters() {

    const recruiterSet =
    new Set();

    const statusSet =
    new Set();

    allCandidates.forEach(c => {

        if (c.Owner?.name) {

            recruiterSet.add(
                c.Owner.name
            );

        }

        if (c.Candidate_Status) {

            statusSet.add(
                c.Candidate_Status
            );

        }

    });

    document.getElementById(
        "recruiterFilter"
    ).innerHTML =
    `
    <option value="all">
        All Recruiters
    </option>
    ` +
    [...recruiterSet]
    .map(r =>
        `<option value="${r}">${r}</option>`
    )
    .join("");

    document.getElementById(
        "statusFilter"
    ).innerHTML =
    `
    <option value="all">
        All Status
    </option>
    ` +
    [...statusSet]
    .map(s =>
        `<option value="${s}">${s}</option>`
    )
    .join("");

}

/* ====================================
   FILTER DATA
==================================== */

function applyFilters() {

    const recruiter =
    document.getElementById(
        "recruiterFilter"
    ).value;

    const status =
    document.getElementById(
        "statusFilter"
    ).value;

    const search =
    document.getElementById(
        "searchInput"
    ).value.toLowerCase();

    const startDate =
    document.getElementById(
        "startDate"
    ).value;

    const endDate =
    document.getElementById(
        "endDate"
    ).value;

    filteredCandidates =
    allCandidates.filter(c => {

        const recruiterMatch =
            recruiter === "all" ||
            c.Owner?.name === recruiter;

        const statusMatch =
            status === "all" ||
            c.Candidate_Status === status;

        const searchMatch =
            (c.Full_Name || "")
            .toLowerCase()
            .includes(search);

        const createdDate =
            c.Created_Time
            ? c.Created_Time.split("T")[0]
            : "";

        const startMatch =
            !startDate ||
            createdDate >= startDate;

        const endMatch =
            !endDate ||
            createdDate <= endDate;

        return (
            recruiterMatch &&
            statusMatch &&
            searchMatch &&
            startMatch &&
            endMatch
        );

    });

    currentPage = 1;

    renderStats();

    renderTable();

}

/* ====================================
   RENDER STATS
==================================== */

function renderStats() {

    document.getElementById(
        "totalCount"
    ).innerText =
    filteredCandidates.length;

    document.getElementById(
        "selectedCount"
    ).innerText =
    filteredCandidates.filter(
        c => c.Candidate_Status === "Selected"
    ).length;

    document.getElementById(
        "progressCount"
    ).innerText =
    filteredCandidates.filter(
        c =>
        c.Candidate_Status ===
        "Interview In Progress"
    ).length;

    document.getElementById(
        "rejectedCount"
    ).innerText =
    filteredCandidates.filter(
        c => c.Candidate_Status === "Rejected"
    ).length;

}

/* ====================================
   RENDER TABLE
==================================== */

function renderTable() {

    const tbody =
    document.getElementById(
        "candidateTable"
    );

    const start =
    (currentPage - 1) * rowsPerPage;

    const end =
    start + rowsPerPage;

    const pageData =
    filteredCandidates.slice(
        start,
        end
    );

    if (pageData.length === 0) {

        tbody.innerHTML =
        `
        <tr>
            <td colspan="6" class="loading">
                No Candidates Found
            </td>
        </tr>
        `;

        return;

    }

    tbody.innerHTML =
    pageData.map(c => {

        const status =
        c.Candidate_Status || "New";

        let statusClass =
        "new";

        if (status === "Selected") {

            statusClass =
            "selected";

        }

        else if (status === "Rejected") {

            statusClass =
            "rejected";

        }

        else if (
            status ===
            "Interview In Progress"
        ) {

            statusClass =
            "progress";

        }

        return `
        <tr>

            <td>
                <strong>
                    ${c.Full_Name || "-"}
                </strong>
            </td>

            <td>
                ${c.Email || "-"}
            </td>

            <td>
                ${c.Owner?.name || "-"}
            </td>

            <td>
                <span class="status ${statusClass}">
                    ${status}
                </span>
            </td>

            <td>
                ${
                    c.Created_Time
                    ? c.Created_Time.split("T")[0]
                    : "-"
                }
            </td>

            <td>

                <button
                    class="view-btn"
                    onclick="viewCandidate('${c.id}')"
                >
                    View
                </button>

            </td>

        </tr>
        `;

    }).join("");

    const totalPages =
    Math.ceil(
        filteredCandidates.length /
        rowsPerPage
    );

    document.getElementById(
        "pageInfo"
    ).innerText =
    `Page ${currentPage} of ${totalPages}`;

}

/* ====================================
   PAGINATION
==================================== */

function nextPage() {

    const totalPages =
    Math.ceil(
        filteredCandidates.length /
        rowsPerPage
    );

    if (currentPage < totalPages) {

        currentPage++;

        renderTable();

    }

}

function prevPage() {

    if (currentPage > 1) {

        currentPage--;

        renderTable();

    }

}

/* ====================================
   VIEW DETAILS
==================================== */

function viewCandidate(id) {

    const c =
    allCandidates.find(
        x => x.id === id
    );

    if (!c) return;

    document.getElementById(
        "candidateModal"
    ).style.display = "flex";

    document.getElementById(
        "candidateDetails"
    ).innerHTML = `

    <div class="detail">
        <strong>Name</strong>
        <p>${c.Full_Name || "-"}</p>
    </div>

    <div class="detail">
        <strong>Email</strong>
        <p>${c.Email || "-"}</p>
    </div>

    <div class="detail">
        <strong>Phone</strong>
        <p>${c.Phone || "-"}</p>
    </div>

    <div class="detail">
        <strong>Status</strong>
        <p>${c.Candidate_Status || "-"}</p>
    </div>

    <div class="detail">
        <strong>Recruiter</strong>
        <p>${c.Owner?.name || "-"}</p>
    </div>

    <div class="detail">
        <strong>Created Date</strong>
        <p>
            ${
                c.Created_Time
                ? c.Created_Time.split("T")[0]
                : "-"
            }
        </p>
    </div>

    `;

}

function closeModal() {

    document.getElementById(
        "candidateModal"
    ).style.display = "none";

}

/* ====================================
   EVENTS
==================================== */

document.getElementById(
    "recruiterFilter"
).addEventListener(
    "change",
    applyFilters
);

document.getElementById(
    "statusFilter"
).addEventListener(
    "change",
    applyFilters
);

document.getElementById(
    "searchInput"
).addEventListener(
    "keyup",
    applyFilters
);

document.getElementById(
    "startDate"
).addEventListener(
    "change",
    applyFilters
);

document.getElementById(
    "endDate"
).addEventListener(
    "change",
    applyFilters
);

/* ====================================
   LOAD PAGE
==================================== */

window.onload =
loadCandidates;

</script>

</body>
</html>
