<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Candidate Management — Minimal</title>
  <style>
    body{font-family: Inter, system-ui, -apple-system, sans-serif;background:#f8fafc;color:#0f172a;padding:24px}
    .card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px;border-bottom:1px solid #f1f5f9;text-align:left}
    th{color:#64748b;font-size:13px;text-transform:uppercase}
    .muted{color:#64748b;font-size:13px}
    .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .btn{background:#4f46e5;color:#fff;padding:8px 12px;border-radius:8px;text-decoration:none}
  </style>
</head>
<body>
  <div class="topbar">
    <div>
      <h1 style="margin:0;font-size:20px">Candidate Management</h1>
      <div class="muted">Lightweight candidate list (fetched from server)</div>
    </div>
    <div>
      <a class="btn" id="backBtn">← Back</a>
    </div>
  </div>

  <div class="card">
    <div id="status" class="muted">Loading…</div>
    <table id="jobsTable" style="margin-top:12px;display:none">
      <thead>
        <tr><th>Job Title</th><th>Job ID</th><th>Candidates</th></tr>
      </thead>
      <tbody id="jobsBody"></tbody>
    </table>
  </div>

  <script>
    const API_ROOT = '/api';
    document.getElementById('backBtn').href = window.location.origin + '/JobOpening.html';

    async function load() {
      const status = document.getElementById('status');
      try {
        const res = await fetch(API_ROOT + '/dashboard-data');
        if (!res.ok) throw new Error('Server returned ' + res.status);
        const j = await res.json();
        if (!j || !j.success) throw new Error(j && j.message ? j.message : 'Invalid response');

        const jobs = j.data && j.data.JobOpenings ? j.data.JobOpenings : [];
        const tbody = document.getElementById('jobsBody');
        tbody.innerHTML = '';
        if (jobs.length === 0) {
          status.innerText = 'No job openings found.';
          return;
        }
        jobs.forEach(job => {
          const tr = document.createElement('tr');
          const title = job.Job_Opening_Name || job.Posting_Title || job.Job_Opening_Name || job.Job_Opening_Title || job.Job_Opening || job.Job_Title || 'Untitled Job';
          const id = job.id || job.Job_Opening_ID || '';
          const candidates = job.No_of_Candidates_Associated || job.No_of_Candidates || job.Number_of_Candidates_Associated || job.No_of_Candidates || '-';
          tr.innerHTML = `<td>${escapeHtml(String(title))}</td><td>${escapeHtml(String(id))}</td><td>${escapeHtml(String(candidates))}</td>`;
          tbody.appendChild(tr);
        });
        document.getElementById('jobsTable').style.display = '';
        status.style.display = 'none';
      } catch (err) {
        status.innerText = 'Failed to load: ' + err.message;
        console.error(err);
      }
    }

    function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
    load();
  </script>
</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Candidate Management Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
    --primary:#4f46e5;
    --primary-light:#eef2ff;
    --success:#16a34a;
    --danger:#dc2626;
    --warning:#f59e0b;
    --info:#2563eb;

    --bg:#f8fafc;
    --card:#ffffff;
    --text:#0f172a;
    --muted:#64748b;
    --border:#e2e8f0;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
    padding:30px;
}

/* =====================================================
HEADER
===================================================== */

.top-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
    margin-bottom:30px;
}

.page-title h1{
    font-size:32px;
    font-weight:800;
    margin-bottom:6px;
}

.page-title p{
    color:var(--muted);
    font-size:14px;
}

/* =====================================================
FILTER BAR
===================================================== */

.filter-bar{
    width:100%;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:18px;
    padding:18px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:16px;
    margin-bottom:30px;
    box-shadow:0 2px 8px rgba(0,0,0,0.04);
}

.filter-box{
    display:flex;
    flex-direction:column;
    gap:6px;
}

.filter-box label{
    font-size:11px;
    text-transform:uppercase;
    font-weight:700;
    color:var(--muted);
    letter-spacing:0.5px;
}

.filter-box select,
.filter-box input{
    border:1px solid var(--border);
    background:#fff;
    padding:11px 14px;
    border-radius:10px;
    outline:none;
    font-size:14px;
    font-weight:600;
    color:var(--text);
}

.filter-box select:focus,
.filter-box input:focus{
    border-color:var(--primary);
}

.refresh-btn{
    background:linear-gradient(135deg,var(--primary),#6366f1);
    border:none;
    color:white;
    border-radius:12px;
    font-weight:700;
    cursor:pointer;
    padding:12px;
    transition:0.2s;
}

.refresh-btn:hover{
    transform:translateY(-1px);
}

/* =====================================================
STAT CARDS
===================================================== */

.stats-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.stat-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:18px;
    padding:24px;
    position:relative;
    overflow:hidden;
}

.stat-card::before{
    content:'';
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:4px;
}

.stat-card.total::before{ background:#4f46e5; }
.stat-card.selected::before{ background:#16a34a; }
.stat-card.progress::before{ background:#2563eb; }
.stat-card.rejected::before{ background:#dc2626; }

.stat-card h3{
    color:var(--muted);
    font-size:12px;
    margin-bottom:10px;
    text-transform:uppercase;
    letter-spacing:0.5px;
}

.stat-card p{
    font-size:34px;
    font-weight:800;
}

/* =====================================================
TABLE
===================================================== */

.table-wrapper{
    background:var(--card);
    border-radius:18px;
    overflow:hidden;
    border:1px solid var(--border);
    box-shadow:0 2px 8px rgba(0,0,0,0.04);
}

.table-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:22px;
    border-bottom:1px solid var(--border);
}

.table-header h2{
    font-size:18px;
    font-weight:800;
}

.record-count{
    background:var(--primary-light);
